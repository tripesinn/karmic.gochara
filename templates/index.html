<!DOCTYPE html>
<html lang="{{ lang.code if lang.code else 'fr' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✦ {{ lang.title if lang.title else 'Karmic Gochara' }}</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#c9a84c">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gochara">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #0a0a08; --gold: #c9a84c; --text: #e8e4d8; --text-dim: #8a8678;
            --border: #2a2820; --display: 'Cinzel', serif; --body: 'EB Garamond', serif;
        }
        body { background: var(--bg); color: var(--text); font-family: var(--body); margin: 0; text-align: center; }
        header { padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        
        .hero-title { font-family: var(--display); font-size: clamp(2rem, 8vw, 3.5rem); margin-top: 10vh; text-transform: uppercase; }
        .login-card { border: 1px solid rgba(201,168,76,0.2); padding: 2.5rem; max-width: 400px; margin: 3rem auto; background: #111110; }
        
        .login-input { width: 100%; padding: 0.85rem; margin-bottom: 1.5rem; background: #000; border: 1px solid var(--border); color: #fff; outline: none; box-sizing: border-box; font-family: var(--body); }
        
        .btn-primary { 
            background: var(--gold); border: none; padding: 0.85rem 1.5rem; cursor: pointer; 
            font-family: var(--display); font-size: 0.7rem; width: 100%; margin-bottom: 10px; 
            transition: all 0.3s; position: relative; overflow: hidden;
        }
        .btn-primary:disabled { opacity: 0.7; cursor: wait; }
        
        .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 0.85rem 1.5rem; cursor: pointer; font-family: var(--display); font-size: 0.7rem; width: 100%; }
        
        #app-section { display: none; padding: 2rem; }
        .date-input { background: #111110; border: 1px solid var(--border); color: #fff; padding: 0.8rem; margin-bottom: 1rem; width: 100%; max-width: 300px; font-family: var(--body); }

        /* Animation de la roue (Spinner) */
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .registration-area { display: none; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); text-align: left; }
        .label-small { font-size: 0.7rem; color: var(--gold); font-family: var(--display); margin-bottom: 5px; display: block; letter-spacing: 0.1em; }

        #btn-coffee {
            position: fixed; bottom: 18px; right: 18px; z-index: 999;
            background: var(--gold); color: #000;
            border: none; padding: 8px 16px;
            font-family: var(--display); font-size: 0.7rem;
            font-weight: bold; cursor: pointer;
            text-decoration: none; display: inline-block;
            transition: opacity 0.2s;
        }
        #btn-coffee:hover { opacity: 0.85; }
        #btn-x {
            position: fixed; bottom: 18px; left: 18px; z-index: 999;
            background: #000; color: #fff;
            border: 1px solid var(--border); padding: 8px 14px;
            font-family: var(--display); font-size: 0.7rem;
            font-weight: bold; cursor: pointer;
            text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
            transition: opacity 0.2s;
        }
        #btn-x:hover { opacity: 0.75; }
    </style>
</head>
<body>

<header>
    <div style="color: var(--gold); font-family: var(--display); font-size: 0.8rem; letter-spacing: 0.2em;">KARMIC GOCHARA</div>
    <select id="lang-select" onchange="setLang(this.value)" style="background: transparent; color: var(--gold); border: 1px solid var(--border); padding: 5px;">
        {% for code, l in langs.items() %}
        <option value="{{ code }}" {% if code == lang.code %}selected{% endif %}>{{ l.label }}</option>
        {% endfor %}
    </select>
</header>

<div id="hero-section" style="{% if session_user %}display:none;{% endif %}">
    <h1 class="hero-title">TON <span style="color: var(--gold);">Karma</span><br>ÉCRIT DANS LES ÉTOILES</h1>
    
    <div class="login-card">
        <input id="pseudo-input" class="login-input" type="text" placeholder="{{ lang.pseudo_ph if lang.pseudo_ph else 'Ton pseudo...' }}">
        
        <div id="registration-fields" class="registration-area">
            <span class="label-small">Date de Naissance</span>
            <input id="birth-date" class="login-input" type="date">
            
            <span class="label-small">Heure de Naissance</span>
            <input id="birth-time" class="login-input" type="time">
            
            <span class="label-small">Ville de Naissance</span>
            <input id="birth-city" class="login-input" type="text" placeholder="Ex: Paris">
        </div>

        <button id="main-action-btn" class="btn-primary" onclick="login()">{{ lang.login if lang.login else 'CONNEXION' }}</button>
        <button id="toggle-reg-btn" class="btn-secondary" onclick="toggleRegistration()">{{ lang.create_profile if lang.create_profile else 'CRÉER UN PROFIL' }}</button>
        
        <div id="login-error" style="color: #c97a6b; margin-top: 15px; font-size: 0.85rem; font-style: italic;"></div>
    </div>
</div>

<div id="app-section" style="{% if session_user %}display:block;{% endif %}">
    <div style="display: flex; justify-content: space-between; margin-bottom: 2rem;">
        <span style="color: var(--gold); font-family: var(--display);">✦ {{ session_user }}</span>
        <button onclick="logout()" style="background:none; border:none; color:var(--text-dim); cursor:pointer;">[ {{ lang.logout if lang.logout else 'Déconnexion' }} ]</button>
    </div>
    
    <input type="date" id="transit-date" class="date-input" value="{{ today_iso }}">
    <br>
    <div style="max-width: 300px; margin: 0 auto; position: relative;">
        <div style="font-size: 0.7rem; color: var(--text-dim); font-family: var(--display); letter-spacing: 0.05em; text-align: left; margin-bottom: 4px;">LIEU DE TRANSIT</div>
        <div style="display: flex; gap: 8px;">
            <button id="geo-btn" class="btn-secondary" style="width: auto; padding: 0.85rem 1rem; flex-shrink: 0;" onclick="useGeolocation()" title="Utiliser ma position actuelle">
                <span id="geo-icon">📍</span>
            </button>
            <div style="flex: 1; position: relative;">
                <input id="transit-city-input" class="login-input" type="text" autocomplete="off"
                    placeholder="{{ lang.geo_auto if lang.geo_auto else 'Position auto ou saisir une ville…' }}"
                    style="margin-bottom: 0; font-size: 0.85rem;"
                    oninput="onCityInput(this.value)"
                    onfocus="onCityInput(this.value)">
                <div id="city-suggestions" style="display:none; position:absolute; top:100%; left:0; right:0; background:#111110; border:1px solid var(--border); z-index:100; max-height:180px; overflow-y:auto;"></div>
            </div>
        </div>
    </div>
    <br>
    <button id="calc-btn" class="btn-primary" style="max-width: 300px;" onclick="calculate()">
        <span id="btn-text">{{ lang.calculate if lang.calculate else 'CALCULER' }}</span>
    </button>

    <div id="synthesis-box" style="margin-top: 3rem; text-align: left; display: none; max-width: 800px; margin-left: auto; margin-right: auto; padding: 0 20px;">
        <div id="synthesis-content" style="line-height: 1.8; font-size: 1.1rem;"></div>
        <div style="margin-top: 1.5rem; text-align: center;">
            <button id="btnEmail" class="btn-secondary" onclick="sendSynthesisEmail()" style="max-width: 260px;">
                {{ lang.send_email if lang.send_email else '📧 Recevoir par email' }}
            </button>
            <span id="email-status" style="display: block; margin-top: 0.5rem; font-size: 0.85rem; color: var(--text-dim);"></span>
        </div>
    </div>
</div>

<a id="btn-coffee" href="https://buymeacoffee.com/jerome6" target="_blank" rel="noopener">
    ☕ {{ lang.support_label if lang.support_label else 'Soutenir le projet' }}
</a>

<a id="btn-x" href="https://x.com/siderealAstro13" target="_blank" rel="noopener">
    <svg width="14" height="14" viewBox="0 0 1200 1227" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M714.163 519.284L1160.89 0H1055.03L667.137 450.887L357.328 0H0L468.492 681.821L0 1226.37H105.866L515.491 750.218L842.672 1226.37H1200L714.137 519.284H714.163ZM569.165 687.828L521.697 619.934L144.011 79.6944H306.615L611.412 515.685L658.88 583.579L1055.08 1150.3H892.476L569.165 687.854V687.828Z"/></svg>
    @siderealAstro13
</a>

<script>
function setLang(code) {
    fetch('/set_lang', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({lang: code})
    }).then(() => location.reload());
}

function toggleRegistration() {
    const fields = document.getElementById('registration-fields');
    const mainBtn = document.getElementById('main-action-btn');
    const toggleBtn = document.getElementById('toggle-reg-btn');
    const errDiv = document.getElementById('login-error');

    if (fields.style.display === 'none' || fields.style.display === '') {
        fields.style.display = 'block';
        mainBtn.innerHTML = "S'INSCRIRE ET SE CONNECTER";
        mainBtn.onclick = register;
        toggleBtn.innerHTML = "RETOUR À LA CONNEXION";
    } else {
        fields.style.display = 'none';
        mainBtn.innerHTML = "{{ lang.login if lang.login else 'CONNEXION' }}";
        mainBtn.onclick = login;
        toggleBtn.innerHTML = "{{ lang.create_profile if lang.create_profile else 'CRÉER UN PROFIL' }}";
    }
    errDiv.textContent = "";
}

function login() {
    const pseudo = document.getElementById('pseudo-input').value.trim();
    const errDiv = document.getElementById('login-error');
    if (!pseudo) { errDiv.textContent = "Pseudo requis."; return; }

    errDiv.style.color = "var(--gold)";
    errDiv.textContent = "Alignement des énergies...";

    fetch('/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({pseudo: pseudo})
    })
    .then(r => r.json())
    .then(data => {
        if (data.ok) location.reload();
        else { errDiv.style.color = "#c97a6b"; errDiv.textContent = data.error || "Inconnu."; }
    });
}

function register() {
    const pseudo = document.getElementById('pseudo-input').value.trim();
    const birthDate = document.getElementById('birth-date').value;
    const birthTime = document.getElementById('birth-time').value;
    const birthCity = document.getElementById('birth-city').value.trim();
    const errDiv = document.getElementById('login-error');
    
    if (!pseudo || !birthDate || !birthTime || !birthCity) {
        errDiv.style.color = "#c97a6b";
        errDiv.textContent = "Champs de naissance manquants.";
        return;
    }

    fetch('/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({pseudo, birth_date: birthDate, birth_time: birthTime, birth_city: birthCity})
    })
    .then(r => r.json())
    .then(data => {
        if (data.ok) location.reload();
        else { errDiv.style.color = "#c97a6b"; errDiv.textContent = data.error; }
    });
}

function calculate() {
    const date = document.getElementById('transit-date').value;
    if (!date) return;

    const btn = document.getElementById('calc-btn');
    const btnText = document.getElementById('btn-text');
    const originalText = btnText.innerHTML;

    // Activation de l'état de chargement (Roue + Texte)
    btn.disabled = true;
    btnText.innerHTML = '<span class="spinner"></span> LECTURE DES ASTRES...';

    const payload = { date, hour: 12, minute: 0 };
    if (transitGeo) {
        payload.transit_lat  = transitGeo.lat;
        payload.transit_lon  = transitGeo.lon;
        payload.transit_city = transitGeo.city;
        payload.transit_tz   = transitGeo.tz;
    }
    fetch('/calculate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
    })
    .then(r => r.json())
    .then(data => {
        // Retour à l'état normal
        btn.disabled = false;
        btnText.innerHTML = originalText;

        if (data.error) {
            alert(data.error);
        } else {
            lastSynthesis = data.synthesis;
            document.getElementById('synthesis-content').innerHTML = marked.parse(data.synthesis);
            document.getElementById('synthesis-box').style.display = 'block';
            document.getElementById('email-status').textContent = '';
            // Scroll automatique vers le résultat
            document.getElementById('synthesis-box').scrollIntoView({ behavior: 'smooth' });
        }
    })
    .catch(err => {
        btn.disabled = false;
        btnText.innerHTML = originalText;
        alert("Erreur de connexion.");
    });
}

let lastSynthesis = '';
let transitGeo = null; // { lat, lon, city, tz }

function useGeolocation() {
    const icon = document.getElementById('geo-icon');
    const input = document.getElementById('transit-city-input');
    if (!navigator.geolocation) {
        input.placeholder = "Géolocalisation non supportée — saisir une ville";
        return;
    }
    icon.textContent = '⏳';
    input.value = '';
    input.placeholder = 'Localisation…';
    input.disabled = true;
    navigator.geolocation.getCurrentPosition(
        async (pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
            try {
                const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language={{ lang.code if lang.code else 'fr' }}`);
                const d = await r.json();
                const city = d.address?.city || d.address?.town || d.address?.village || d.address?.county || 'Position GPS';
                const country = d.address?.country || '';
                transitGeo = { lat, lon, city: `${city}, ${country}`.trim().replace(/,$/, ''), tz };
            } catch {
                transitGeo = { lat, lon, city: `${lat.toFixed(3)}, ${lon.toFixed(3)}`, tz };
            }
            icon.textContent = '✓';
            input.value = transitGeo.city;
            input.disabled = false;
        },
        (err) => {
            icon.textContent = '📍';
            input.disabled = false;
            input.value = '';
            input.placeholder = err.code === 1
                ? 'Permission refusée — saisir une ville'
                : 'Erreur GPS — saisir une ville';
        },
        { timeout: 10000 }
    );
}

let _cityTimer = null;

function onCityInput(val) {
    // Si l'utilisateur efface le champ, on retire la géoloc manuelle
    if (!val.trim()) { transitGeo = null; hideSuggestions(); return; }
    clearTimeout(_cityTimer);
    _cityTimer = setTimeout(() => fetchCitySuggestions(val.trim()), 350);
}

async function fetchCitySuggestions(q) {
    if (q.length < 2) return;
    try {
        const r = await fetch(`/geocode?q=${encodeURIComponent(q)}`);
        const results = await r.json();
        showSuggestions(results);
    } catch { hideSuggestions(); }
}

function showSuggestions(results) {
    const box = document.getElementById('city-suggestions');
    if (!results.length) { hideSuggestions(); return; }
    box.innerHTML = '';
    results.forEach(item => {
        // Nominatim renvoie display_name, lat, lon
        const name = item.display_name || item.name || '';
        const lat  = parseFloat(item.lat);
        const lon  = parseFloat(item.lon);
        const tz   = Intl.DateTimeFormat().resolvedOptions().timeZone;
        const div  = document.createElement('div');
        div.textContent = name;
        div.style.cssText = 'padding:8px 12px; cursor:pointer; font-size:0.82rem; border-bottom:1px solid var(--border); color:var(--text);';
        div.onmouseenter = () => div.style.background = '#1a1a18';
        div.onmouseleave = () => div.style.background = '';
        div.onclick = () => {
            transitGeo = { lat, lon, city: name, tz };
            document.getElementById('transit-city-input').value = name;
            document.getElementById('geo-icon').textContent = '✓';
            hideSuggestions();
        };
        box.appendChild(div);
    });
    box.style.display = 'block';
}

function hideSuggestions() {
    document.getElementById('city-suggestions').style.display = 'none';
}

document.addEventListener('click', (e) => {
    if (!e.target.closest('#transit-city-input') && !e.target.closest('#city-suggestions')) {
        hideSuggestions();
    }
});

async function sendSynthesisEmail() {
    if (!lastSynthesis) { alert('Lance d\'abord un calcul pour obtenir ta synthèse.'); return; }
    const btn = document.getElementById('btnEmail');
    const status = document.getElementById('email-status');
    btn.disabled = true;
    status.style.color = 'var(--text-dim)';
    status.textContent = 'Envoi en cours…';
    try {
        const res = await fetch('/send_synthesis', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ synthesis: lastSynthesis }),
        });
        const data = await res.json();
        if (data.ok) {
            status.textContent = '✓ Synthèse envoyée par email.';
            status.style.color = '#6a9f6a';
        } else {
            status.textContent = '✗ Erreur : ' + (data.error || 'inconnu');
            status.style.color = '#c06060';
        }
    } catch (err) {
        status.textContent = '✗ Erreur réseau.';
        status.style.color = '#c06060';
    } finally {
        btn.disabled = false;
    }
}

function logout() {
    fetch('/logout', { method: 'POST' }).then(() => location.reload());
}

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
}
</script>
</body>
</html>
