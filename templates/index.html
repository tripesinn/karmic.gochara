<!DOCTYPE html>
<html lang="{{ lang.code }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✦ Karmic Gochara</title>
    <style>
        /* Conservez vos styles CSS habituels ici */
        :root { --bg: #0a0a08; --gold: #c9a84c; --text: #e8e4d8; }
        body { background: var(--bg); color: var(--text); font-family: 'EB Garamond', serif; text-align: center; }
        .login-card { border: 1px solid rgba(201,168,76,0.2); padding: 2rem; max-width: 400px; margin: 2rem auto; background: #111110; }
        .login-input { width: 100%; padding: 0.8rem; margin-bottom: 1rem; background: #000; border: 1px solid #2a2820; color: #fff; }
        .btn-primary { background: var(--gold); border: none; padding: 0.8rem 1.5rem; cursor: pointer; font-weight: bold; }
        .btn-secondary { background: transparent; border: 1px solid #2a2820; color: #8a8678; padding: 0.8rem 1.5rem; cursor: pointer; }
    </style>
</head>
<body>

<header style="padding: 1rem; display: flex; justify-content: space-between; align-items: center;">
    <div style="color: var(--gold); font-family: Cinzel;">KARMIC GOCHARA</div>
    <select id="lang-select" onchange="setLang(this.value)" style="background: transparent; color: var(--gold); border: 1px solid var(--gold);">
        {% for code, label in langs.items() %}
        <option value="{{ code }}" {% if code == lang.code %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
    </select>
</header>

<div id="hero-section">
    <h1 style="font-family: Cinzel; font-size: 3rem; margin-top: 15vh;">TON <span style="color: var(--gold);">Karma</span><br>ÉCRIT DANS LES ÉTOILES</h1>
    
    <div class="login-card">
        <input id="pseudo-input" class="login-input" type="text" placeholder="Ton pseudo...">
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button class="btn-primary" onclick="login()">CONNEXION</button>
            <button class="btn-secondary" onclick="register()">CRÉER UN PROFIL</button>
        </div>
        <div id="login-error" style="color: #c97a6b; margin-top: 10px; font-size: 0.9rem;"></div>
    </div>
</div>

<script>
// Fonction pour changer la langue
function setLang(code) {
    fetch('/set_lang', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({lang: code})
    }).then(() => location.reload());
}

// Fonction de connexion (Route Python: /login)
function login() {
    const pseudo = document.getElementById('pseudo-input').value.trim();
    if (!pseudo) return;
    fetch('/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({pseudo: pseudo})
    })
    .then(r => r.json())
    .then(data => {
        if (data.ok) { location.reload(); } // Recharge pour afficher l'app
        else { document.getElementById('login-error').textContent = data.error; }
    });
}

// Fonction de création (Route Python: /register)
function register() {
    const pseudo = document.getElementById('pseudo-input').value.trim();
    if (!pseudo) return;
    fetch('/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({pseudo: pseudo})
    })
    .then(r => r.json())
    .then(data => {
        if (data.ok) { location.reload(); }
        else { document.getElementById('login-error').textContent = data.error; }
    });
}
</script>
</body>
</html>
