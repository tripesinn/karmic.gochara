<!DOCTYPE html>
<html lang="{{ lang.code if lang.code else 'fr' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✦ {{ lang.title if lang.title else 'Karmic Gochara' }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #0a0a08; --gold: #c9a84c; --text: #e8e4d8; --text-dim: #8a8678;
            --border: #2a2820; --display: 'Cinzel', serif; --body: 'EB Garamond', serif;
        }
        body { background: var(--bg); color: var(--text); font-family: var(--body); margin: 0; text-align: center; }
        header { padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .hero-title { font-family: var(--display); font-size: clamp(2rem, 8vw, 3.5rem); margin-top: 10vh; text-transform: uppercase; }
        .login-card { border: 1px solid rgba(201,168,76,0.2); padding: 2.5rem; max-width: 400px; margin: 3rem auto; background: #111110; }
        .login-input { width: 100%; padding: 0.85rem; margin-bottom: 1.5rem; background: #000; border: 1px solid var(--border); color: #fff; outline: none; }
        .btn-primary { background: var(--gold); border: none; padding: 0.85rem 1.5rem; cursor: pointer; font-family: var(--display); font-size: 0.7rem; width: 100%; margin-bottom: 10px; }
        .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 0.85rem 1.5rem; cursor: pointer; font-family: var(--display); font-size: 0.7rem; width: 100%; }
        #app-section { display: none; padding: 2rem; }
        .date-input { background: #111110; border: 1px solid var(--border); color: #fff; padding: 0.8rem; margin-bottom: 1rem; width: 100%; max-width: 300px; }
    </style>
</head>
<body>

<header>
    <div style="color: var(--gold); font-family: var(--display); font-size: 0.8rem; letter-spacing: 0.2em;">KARMIC GOCHARA</div>
    <select id="lang-select" onchange="setLang(this.value)" style="background: transparent; color: var(--gold); border: 1px solid var(--border); padding: 5px;">
        {% for code, l in langs.items() %}
        <option value="{{ code }}" {% if code == lang.code %}selected{% endif %}>{{ l.label }}</option>
        {% endfor %}
    </select>
</header>

<div id="hero-section" style="{% if session_user %}display:none;{% endif %}">
    <h1 class="hero-title">TON <span style="color: var(--gold);">Karma</span><br>ÉCRIT DANS LES ÉTOILES</h1>
    <div class="login-card">
        <input id="pseudo-input" class="login-input" type="text" placeholder="{{ lang.pseudo_ph if lang.pseudo_ph else 'Ton pseudo...' }}">
        <button class="btn-primary" onclick="login()">{{ lang.login if lang.login else 'CONNEXION' }}</button>
        <button class="btn-secondary" onclick="register()">{{ lang.create_profile if lang.create_profile else 'CRÉER UN PROFIL' }}</button>
        <div id="login-error" style="color: #c97a6b; margin-top: 15px; font-size: 0.85rem; font-style: italic;"></div>
    </div>
</div>

<div id="app-section" style="{% if session_user %}display:block;{% endif %}">
    <div style="display: flex; justify-content: space-between; margin-bottom: 2rem;">
        <span style="color: var(--gold); font-family: var(--display);">✦ {{ session_user }}</span>
        <button onclick="logout()" style="background:none; border:none; color:var(--text-dim); cursor:pointer;">[ {{ lang.logout if lang.logout else 'Déconnexion' }} ]</button>
    </div>
    
    <input type="date" id="transit-date" class="date-input" value="{{ today_iso }}">
    <button class="btn-primary" style="max-width: 300px;" onclick="calculate()">{{ lang.calculate if lang.calculate else 'CALCULER' }}</button>

    <div id="synthesis-box" style="margin-top: 3rem; text-align: left; display: none;">
        <div id="synthesis-content" style="line-height: 1.8;"></div>
    </div>
</div>

<script>
function setLang(code) {
    fetch('/set_lang', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({lang: code})
    }).then(() => location.reload());
}

function login() {
    const pseudo = document.getElementById('pseudo-input').value.trim();
    const errDiv = document.getElementById('login-error');
    
    // 1. Vérification si vide
    if (!pseudo) {
        errDiv.style.color = "#c97a6b";
        errDiv.textContent = "Veuillez entrer un pseudo.";
        return;
    }

    // 2. Message de chargement
    errDiv.style.color = "var(--gold)";
    errDiv.textContent = "Connexion en cours...";

    fetch('/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({pseudo: pseudo})
    })
    .then(r => r.json())
    .then(data => {
        if (data.ok) { 
            location.reload(); 
        } else { 
            errDiv.style.color = "#c97a6b";
            errDiv.textContent = data.error || "Pseudo introuvable."; 
        }
    })
    .catch(err => {
        errDiv.style.color = "#c97a6b";
        errDiv.textContent = "Erreur serveur. Vérifiez les logs Render.";
        console.error("Erreur réseau:", err);
    });
}

function register() {
    const pseudo = document.getElementById('pseudo-input').value.trim();
    const errDiv = document.getElementById('login-error');
    
    if (!pseudo) {
        errDiv.style.color = "#c97a6b";
        errDiv.textContent = "Veuillez entrer un pseudo pour créer un profil.";
        return;
    }

    errDiv.style.color = "var(--gold)";
    errDiv.textContent = "Création en cours...";

    fetch('/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({pseudo: pseudo})
    })
    .then(r => r.json())
    .then(data => {
        if (data.ok) { 
            location.reload(); 
        } else { 
            errDiv.style.color = "#c97a6b";
            errDiv.textContent = data.error || "Erreur lors de la création."; 
        }
    })
    .catch(err => {
        errDiv.style.color = "#c97a6b";
        errDiv.textContent = "Erreur serveur. Vérifiez les logs Render.";
        console.error("Erreur réseau:", err);
    });
}

function calculate() {
    const date = document.getElementById('transit-date').value;
    if (!date) return;
    fetch('/calculate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({date: date, hour: 12, minute: 0})
    })
    .then(r => r.json())
    .then(data => {
        if (data.error) { alert(data.error); }
        else {
            document.getElementById('synthesis-content').innerHTML = marked.parse(data.synthesis);
            document.getElementById('synthesis-box').style.display = 'block';
        }
    });
}

function logout() {
    fetch('/logout', { method: 'POST' }).then(() => location.reload());
}
</script>
</body>
</html>
