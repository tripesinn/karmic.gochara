<!DOCTYPE html>
<html lang="{{ lang.code if lang.code else 'fr' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✦ {{ lang.title if lang.title else 'Karmic Gochara' }}</title>
    <!-- ... (tout le contenu de votre <head>) ... -->
    <style>
        /* ... (tout votre CSS) ... */
    </style>
</head>
<body>
    <!-- ... (tout le contenu de votre <body>) ... -->

    <script>
        const T = {{ lang | tojson }};
    </script>
    <script>
        const CACHE_KEY = 'karmic_profile_v2';

        // ── Cache local pour chargement instantané ─────────────────────────────
        function saveProfileToCache(profile) {
            try {
                if (profile && profile.pseudo) {
                    localStorage.setItem(CACHE_KEY, JSON.stringify(profile));
                }
            } catch (e) { console.warn('Failed to save profile', e); }
        }

        function loadProfileFromCache() {
            try {
                const cached = localStorage.getItem(CACHE_KEY);
                return cached ? JSON.parse(cached) : null;
            } catch (e) { return null; }
        }

        function clearProfileCache() {
            try {
                localStorage.removeItem(CACHE_KEY);
                sessionStorage.clear();
            } catch (e) { console.warn('Failed to clear cache', e); }
        }

        function showHeroSection() {
            document.getElementById('hero-section').style.display = 'block';
            document.getElementById('app-section').style.display = 'none';
        }

        function showApp(profile) {
            document.getElementById('hero-section').style.display = 'none';
            document.getElementById('app-section').style.display = 'block';
            document.querySelector('#app-section [style*="--display"]').textContent = `✦ ${profile.pseudo}`;
            
            const alertsToggle = document.getElementById('alerts-toggle');
            if (alertsToggle) alertsToggle.checked = profile.alerts_enabled;

            if (profile.transit_city) {
                transitGeo = { city: profile.transit_city, lat: profile.transit_lat, lon: profile.transit_lon, tz: profile.transit_tz };
                const cityInput = document.getElementById('transit-city-input');
                if (cityInput) {
                    cityInput.value = transitGeo.city;
                    document.getElementById('geo-icon').textContent = '✓';
                }
            }
            // Ces fonctions doivent exister dans le scope global
            if (typeof initHookNatal === 'function') initHookNatal(profile);
            if (typeof initChat === 'function') initChat();
        }

        async function syncProfile() {
            try {
                const res = await fetch('/api/profile');
                if (res.status === 401) {
                    clearProfileCache();
                    window.location.href = '/';
                    return;
                }
                if (res.ok) {
                    const data = await res.json();
                    if (data.ok && data.profile) {
                        saveProfileToCache(data.profile);
                    }
                }
            } catch (e) { console.warn('Sync failed', e); }
        }

        // Au chargement initial
        document.addEventListener('DOMContentLoaded', () => {
            const cachedProfile = loadProfileFromCache();
            if (cachedProfile && cachedProfile.pseudo) {
                showApp(cachedProfile);
                syncProfile();
            } else {
                showHeroSection();
            }
        });
    </script>
    <script>
        // ... (le reste de votre JavaScript, y compris les fonctions login, register, logout modifiées)

        function login() {
            // ...
            fetch('/login', { /* ... */ })
                .then(r => r.json())
                .then(data => {
                    if (data.ok) {
                        saveProfileToCache(data.profile); // MODIFIÉ
                        location.reload();
                    } else {
                        // ...
                    }
                });
        }

        function register() {
            // ...
            fetch('/register', { /* ... */ })
                .then(r => r.json())
                .then(data => {
                    if (data.ok) {
                        saveProfileToCache(data.profile); // MODIFIÉ
                        location.reload();
                    } else {
                        // ...
                    }
                });
        }
        
        function logout() {
            clearProfileCache(); // MODIFIÉ
            fetch('/logout', { method: 'POST' }).then(() => {
                window.location.href = '/';
            });
        }

        // ... etc.
    </script>
</body>
</html>
