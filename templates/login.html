<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ Gochara Karmique — Connexion</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #008080;
  font-family: "MS Sans Serif", "Segoe UI", Arial, sans-serif;
  font-size: 12px;
  color: #000;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.win {
  background: #c0c0c0;
  border: 2px solid;
  border-color: #fff #808080 #808080 #fff;
  box-shadow: 2px 2px 0 #000;
  width: 100%;
  max-width: 360px;
}
.titlebar {
  background: linear-gradient(90deg, #000080 0%, #1084d0 100%);
  color: #fff;
  font-weight: bold;
  font-size: 11px;
  padding: 3px 5px 3px 7px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  user-select: none;
}
.titlebar-btns { display: flex; gap: 2px; }
.tbtn {
  width: 16px; height: 14px;
  background: #c0c0c0;
  border: 1px solid; border-color: #fff #808080 #808080 #fff;
  font-size: 9px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.winbody { padding: 16px; }
.group {
  border: 2px solid;
  border-color: #808080 #fff #fff #808080;
  padding: 12px;
  margin-bottom: 10px;
  background: #c0c0c0;
}
.group-label { font-weight: bold; font-size: 11px; margin-bottom: 8px; color: #000080; }
label { font-size: 11px; display: block; margin-bottom: 2px; }
input[type="text"], input[type="email"] {
  width: 100%;
  background: #fff;
  border: 2px solid; border-color: #808080 #fff #fff #808080;
  padding: 3px 5px;
  font-family: inherit;
  font-size: 11px;
  height: 22px;
  margin-bottom: 8px;
}
.btn {
  background: #c0c0c0;
  border: 2px solid; border-color: #fff #808080 #808080 #fff;
  padding: 4px 16px;
  font-family: inherit;
  font-size: 12px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 1px 1px 0 #000;
  min-width: 90px;
}
.btn:active { border-color: #808080 #fff #fff #808080; box-shadow: none; padding: 5px 15px 3px 17px; }
.btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
.error { color: #800000; font-size: 11px; margin-top: 6px; display: none; }
.sep { border: none; border-top: 1px solid #808080; border-bottom: 1px solid #fff; margin: 10px 0; }
.logo {
  text-align: center;
  font-size: 20px;
  color: #000080;
  font-weight: bold;
  margin-bottom: 4px;
  letter-spacing: 1px;
}
.sub {
  text-align: center;
  font-size: 10px;
  color: #404040;
  margin-bottom: 12px;
  font-style: italic;
}
</style>
</head>
<body>
<div class="win">
  <div class="titlebar">
    <span>✦ Gochara Karmique — Connexion</span>
    <div class="titlebar-btns">
      <button class="tbtn">_</button><button class="tbtn">□</button><button class="tbtn">✕</button>
    </div>
  </div>
  <div class="winbody">
    <div class="logo">✦ @siderealAstro13</div>
    <div class="sub">Astrologie védique karmique sidérale</div>

    <div class="group">
      <div class="group-label">Identification</div>
      <label for="email">Email :</label>
      <input type="email" id="email" placeholder="ton@email.com" autocomplete="email">
      <label for="pseudo">— ou Pseudo :</label>
      <input type="text" id="pseudo" placeholder="ton_pseudo">
      <div id="error-msg" class="error"></div>
    </div>

    <div class="btn-row">
      <button class="btn" onclick="goRegister()">Créer un compte</button>
      <button class="btn" id="login-btn" onclick="doLogin()">Connexion »</button>
    </div>
  </div>
</div>

<script>
"use strict";
function goRegister() { window.location.href = "/register"; }

async function doLogin() {
  const email  = document.getElementById("email").value.trim();
  const pseudo = document.getElementById("pseudo").value.trim();
  const errEl  = document.getElementById("error-msg");
  errEl.style.display = "none";

  if (!email && !pseudo) { showError("Entre ton email ou ton pseudo."); return; }

  document.getElementById("login-btn").disabled = true;
  document.getElementById("login-btn").textContent = "…";

  try {
    const res  = await fetch("/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, pseudo }),
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error || "Erreur inconnue."); return; }
    window.location.href = "/";
  } catch(e) {
    showError("Erreur réseau : " + e.message);
  } finally {
    document.getElementById("login-btn").disabled = false;
    document.getElementById("login-btn").textContent = "Connexion »";
  }
}

function showError(msg) {
  const el = document.getElementById("error-msg");
  el.textContent = "⚠ " + msg;
  el.style.display = "block";
}

document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
</script>
</body>
</html>
