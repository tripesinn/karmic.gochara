services:
  - type: web
    name: gochara-karmique
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # À saisir manuellement dans Render
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: CRON_SECRET
        sync: false          # Token secret pour sécuriser /cron/daily
      - key: ENABLE_FEATURES
        value: "0"           # Calendrier mensuel + rapport annuel — activer sur test uniquement
      - key: ENABLE_LOCAL_AI
        value: "0"           # IA locale Gemma — activer sur test uniquement