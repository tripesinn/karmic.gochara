# Version minimale de Clickable requise
clickable_minimum_required: 7.1.2

# Le template QML est idéal pour les applications basées sur un WebView.
template: qml

# Arguments de compilation spécifiques. Nous ciblons arm64 pour les appareils modernes.
build_args: --arch arm64

# Dépendances nécessaires sur le système de développement (PC)
# pour la compilation croisée vers la base Ubuntu 24.04 (Noble Numbat).
dependencies_host:
  - build-essential
  - qt6-base-dev
  - qt6-declarative-dev
  - qt6-webengine-dev
  - libqt6core6
  - qml-module-lomiri-components
  - clickable

# Dépendances qui seront installées sur l'appareil cible.
dependencies_target:
  - libqt6core6
  - libqt6gui6
  - libqt6qml6
  - libqt6quick6
  - libqt6webenginecore6
  - libqt6webenginequick6
  - qml-module-qtquick
  - qml-module-lomiri-components
  - qml-module-qtwebengine

# Script à exécuter après la compilation (cmake/make).
# Ceci est l'étape CRUCIALE : nous copions votre dossier web 'www'
# dans le paquet de l'application pour que le WebView puisse le charger.
postmake:
  cp -r ${SOURCE_DIR}/www ${DESTDIR}/${APP_ID}/
