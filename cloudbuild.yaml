steps:
  # Fetch secrets excluded from git (doctrine.py)
  - id: fetch-secrets
    name: gcr.io/cloud-builders/gsutil
    args:
      - cp
      - gs://karmic-gochara-build-assets/doctrine.py
      - /workspace/doctrine.py

  # Build with layer caching via Artifact Registry (--no-cache forced 2026-06-16)
  - id: build
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker pull $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/karmic.gochara/$_SERVICE_NAME:latest || true
        docker build \
          --cache-from $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/karmic.gochara/$_SERVICE_NAME:latest \
          -t $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/karmic.gochara/$_SERVICE_NAME:latest \
          -f Dockerfile .

  # Push image
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/karmic.gochara/$_SERVICE_NAME
    waitFor:
      - build

  # Deploy to Cloud Run
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - $_SERVICE_NAME
      - --platform=managed
      - --image=$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/karmic.gochara/$_SERVICE_NAME:latest
      - --region=$_DEPLOY_REGION
      - --quiet
    waitFor:
      - push

substitutions:
  _SERVICE_NAME: gochara-api
  _DEPLOY_REGION: europe-west1
  _AR_HOSTNAME: europe-west1-docker.pkg.dev

timeout: 1200s
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
