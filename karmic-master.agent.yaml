# Karmic Master Agent Configuration (agent.yaml)

# Agent Identity
name: karmic-master
display_name: Karmic Master Astrological Interpreter
description: >
  An agent that provides personalized karmic interpretations based on astrological
  data (Dasha, Nakshatra) and the application's doctrine. It integrates with
  external services for user data and payment verification.

# Agent I/O
schema:
  input:
    type: object
    properties:
      birthdate:
        type: string
        format: date-time
        description: The user's full date and time of birth for astrological calculations.
      user_query:
        type: string
        description: The user's specific question or area of focus.
    required:
      - birthdate
      - user_query
  output:
    type: object
    properties:
      karmic_interpretation:
        type: string
        format: markdown
        description: The detailed karmic interpretation, formatted in Markdown.
    required:
      - karmic_interpretation

# Core Logic
purpose: >
  To synthesize pre-calculated astrological data (like Dasha and Nakshatra placements)
  with the application's internal doctrine, providing a coherent and relevant karmic
  interpretation in response to a user's query. All complex astrological
  calculations are performed by local Python functions before this agent is invoked.

# External Integrations & Tools
external_apis:
  - name: Google Sheets
    description: Reads user data and preferences from a designated Google Sheet.
    authentication: OAuth 2.0 or Service Account
    operations: [read]
  - name: Stripe API
    description: Verifies the user's payment status to ensure access to premium features.
    authentication: API Key
    operations: [check_payment_status]

# Safety & Guardrails
safety_rules:
  - rule: no_medical_advice
    description: The agent must explicitly refuse to answer any questions related to health, or medical conditions.
  - rule: no_guaranteed_predictions
    description: The agent must not present any interpretation as a guaranteed prediction or certain future event.
  - rule: mandatory_disclaimer
    description: >
      Every response must include a disclaimer stating that the interpretations
      are for entertainment purposes and not a substitute for professional advice.
