apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply plugin: 'com.github.triplet.play'

android {
    namespace = "com.karmicgochara.app"
    compileSdk = rootProject.ext.compileSdkVersion
    ndkVersion = "26.1.10909125"
    defaultConfig {
        applicationId "com.karmicgochara.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 26
        versionName "1.9.7"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            storeFile file("/Users/jero87/Library/CloudStorage/GoogleDrive-jerome@jeromemalige.fr/Mon Drive/karmic-key")
            storePassword "nRqzZ@x;akZDsfcVWg^Y"
            keyAlias "key0"
            keyPassword "nRqzZ@x;akZDsfcVWg^Y"
        }
    }
    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            signingConfig signingConfigs.release
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro' // Fix Gradle Proguard
            ndk {
                debugSymbolLevel 'FULL'
            }
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

play {
    serviceAccountCredentials = file("play-service-account.json")
    track = "internal"
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation 'androidx.documentfile:documentfile:1.0.1'
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"

    // ── Gemma 4 — LiteRT-LM (inférence locale) ──
    implementation 'com.google.ai.edge.litertlm:litertlm-android:latest.release'
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.24"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-core:1.11.0"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.11.0"
    configurations.all {
        resolutionStrategy {
            force 'org.jetbrains.kotlinx:kotlinx-coroutines-core:1.11.0'
            force 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.11.0'
        }
    }

    // ── Google Play Billing (achat one-shot "Karmic PRO" 9,99€) ─────────────
    implementation 'com.android.billingclient:billing:7.1.1'

    // ── AdMob SUPPRIMÉ — remplacé par Buy me a coffee (tip jar) ─────────────

    // ── Firebase (BoM + Auth + Firestore) ─────────────────────────────────────
    implementation platform('com.google.firebase:firebase-bom:34.15.0')
    implementation 'com.google.firebase:firebase-auth'
    implementation 'com.google.firebase:firebase-firestore'

    // ── Google Sign-In via Credential Manager ─────────────────────────────────
    implementation 'com.google.android.libraries.identity.googleid:googleid:1.1.1'
    implementation 'androidx.credentials:credentials:1.5.0'
    implementation 'androidx.credentials:credentials-play-services-auth:1.5.0'

    // ── Google Sign-In legacy (requis par @codetrix-studio/capacitor-google-auth v3) ─
    implementation 'com.google.android.gms:play-services-auth:21.6.0'
}

apply from: 'capacitor.build.gradle'

apply plugin: 'com.google.gms.google-services'
